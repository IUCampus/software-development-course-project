
server:
  port: ${PORT:8082}

spring:
  application:
    name: backend-movie
  # Cloud Gateway config
  cloud:
    gateway:
      global-cors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*" # Allow all for production or specify frontend URL
            allowedMethods: "*"
            allowedHeaders: "*"
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://movie_microservices:microservices@cluster0.ttgcs.mongodb.net/movieMicroservice?appName=Cluster0}
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://movie_microservices:microservices@cluster0.ttgcs.mongodb.net/movieMicroservice?appName=Cluster0}
      repositories:
        type: auto
  main:
    allow-bean-definition-overriding: true

eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
