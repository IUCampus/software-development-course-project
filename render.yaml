# 🛑 STOP! THIS IS NOT A DOCKERFILE!
# 🛑 THIS IS A RENDER BLUEPRINT CONFIGURATION FILE.
#
# To deploy to Render:
# 1. Use the "Blueprints" menu in the Render dashboard.
# 2. Render will automatically use THIS file to find the REAL Dockerfiles in:
#    - ./backend-movie/Dockerfile
#    - ./frontend-movie/Dockerfile
#
# DO NOT point Render's "Dockerfile Path" to this file.
# -------------------------------------------------------------------------
services:
  # ----------------------------------------
  # 1. BACKEND SERVICE
  # ----------------------------------------
  - type: web
    name: backend-movie
    env: docker
    rootDir: ./backend-movie
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8082"
      - key: SPRING_DATA_MONGODB_URI
        value: "mongodb+srv://movie_microservices:microservices@cluster0.ttgcs.mongodb.net/movieMicroservice?appName=Cluster0"

  # ----------------------------------------
  # 2. FRONTEND SERVICE
  # ----------------------------------------
  - type: web
    name: frontend-movie
    env: docker
    rootDir: ./frontend-movie
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      # ⚠️ CRITICAL: VITE_API_BASE_URL must be passed as a Build Argument to be "baked in"
      # at build time. Render handles this via 'envVars' in 'env: docker' services.
      # You MUST put the live web address of your backend here once Render creates it.
      - key: VITE_API_BASE_URL
        value: "https://backend-movie.onrender.com" # Example: Replace with your actual backend URL